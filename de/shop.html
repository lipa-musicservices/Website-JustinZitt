<!doctype html>
<html lang="en" id="top">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Justin Zitt – Online Shop</title>
  <meta
    name="description"
    content="Official online shop for Justin Zitt. Music, merchandise, sheet music, and selected items."
  />

  <meta property="og:title" content="Justin Zitt – Online Shop" />
  <meta
    property="og:description"
    content="Official online shop for music, merchandise, and selected items."
  />

  <style>
    :root{
      --bg:#f7f3eb;
      --bg-soft:#efe8dc;
      --paper:#fffdf8;
      --paper-2:#f8f1e6;

      --line:rgba(58,45,30,.12);
      --line-strong:rgba(58,45,30,.22);

      --text:#231c15;
      --text-soft:#6b6258;

      --accent:#8f6b46;
      --accent-2:#ccb08a;
      --accent-dark:#6f5234;

      --ok:#356e43;
      --warn:#a06e26;
      --danger:#9a4037;

      --shadow:0 14px 42px rgba(37,25,14,.08);
      --shadow-soft:0 8px 24px rgba(37,25,14,.05);

      --radius:20px;
      --container:1160px;
      --sectionPad:88px;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(1000px 500px at 10% 0%, rgba(200,171,132,.18), rgba(0,0,0,0) 60%),
        radial-gradient(900px 500px at 90% 10%, rgba(143,107,70,.08), rgba(0,0,0,0) 60%),
        linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    input,
    select{
      font:inherit;
    }

    .container{
      width:min(var(--container), calc(100% - 32px));
      margin:0 auto;
    }

    #HeadbarSlot,
    #FootbarSlot,
    #CookieSlot{
      width:100%;
    }

    .ShopHero{
      position:relative;
      padding:132px 0 52px;
      overflow:hidden;
    }

    .ShopHero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(700px 260px at 12% 0%, rgba(143,107,70,.16), rgba(0,0,0,0) 60%),
        radial-gradient(680px 240px at 88% 0%, rgba(204,176,138,.14), rgba(0,0,0,0) 58%);
      pointer-events:none;
    }

    .ShopHero__content{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:28px;
      align-items:end;
    }

    .ShopHero__eyebrow{
      margin:0 0 10px;
      color:var(--accent);
      font-size:10pt;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .ShopHero h1{
      margin:0 0 14px;
      font-size:clamp(40px, 6vw, 78px);
      line-height:.95;
      letter-spacing:-.04em;
    }

    .ShopHero__text{
      margin:0;
      max-width:700px;
      color:var(--text-soft);
      line-height:1.72;
      font-size:12.2pt;
    }

    .ShopHero__stats{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:12px;
    }

    .StatCard{
      padding:18px 16px;
      border-radius:18px;
      background:rgba(255,253,248,.78);
      border:1px solid rgba(58,45,30,.08);
      box-shadow:var(--shadow-soft);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .StatCard strong{
      display:block;
      font-size:18pt;
      line-height:1;
      margin-bottom:6px;
    }

    .StatCard span{
      display:block;
      color:var(--text-soft);
      font-size:10.3pt;
      line-height:1.45;
      font-weight:700;
    }

    .ShopSection{
      padding:0 0 var(--sectionPad);
    }

    .ShopLayout{
      display:grid;
      grid-template-columns:300px 1fr;
      gap:22px;
      align-items:start;
    }

    .FilterPanel{
      position:sticky;
      top:98px;
      padding:20px;
      border-radius:24px;
      background:rgba(255,253,248,.82);
      border:1px solid rgba(58,45,30,.08);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .FilterPanel__title{
      margin:0 0 14px;
      font-size:15pt;
      font-weight:900;
    }

    .FilterGroup{
      margin-bottom:18px;
    }

    .FilterGroup:last-child{
      margin-bottom:0;
    }

    .FilterLabel{
      display:block;
      margin:0 0 8px;
      font-size:10pt;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--accent);
    }

    .SearchField,
    .SelectField{
      width:100%;
      height:46px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid rgba(58,45,30,.10);
      background:#fffdf9;
      color:var(--text);
      outline:none;
      transition:border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .SearchField:focus,
    .SelectField:focus{
      border-color:rgba(143,107,70,.30);
      box-shadow:0 0 0 4px rgba(143,107,70,.10);
    }

    .ChipRow{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .Chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(58,45,30,.10);
      background:#fffaf3;
      color:var(--text);
      font-weight:800;
      font-size:10pt;
      cursor:pointer;
      transition:transform .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
    }

    .Chip:hover{
      transform:translateY(-1px);
      background:rgba(143,107,70,.08);
    }

    .Chip.is-active{
      background:rgba(143,107,70,.12);
      border-color:rgba(143,107,70,.22);
    }

    .FilterActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:44px;
      padding:10px 15px;
      border-radius:14px;
      border:1px solid transparent;
      font-weight:900;
      letter-spacing:.02em;
      cursor:pointer;
      transition:transform .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn--soft{
      background:rgba(143,107,70,.08);
      color:var(--text);
      border-color:rgba(143,107,70,.14);
    }

    .btn--soft:hover{
      background:rgba(143,107,70,.12);
    }

    .btn--primary{
      background:var(--accent);
      color:#fffaf3;
      border-color:var(--accent);
    }

    .btn--primary:hover{
      background:var(--accent-dark);
      border-color:var(--accent-dark);
    }

    .ShopMain{
      min-width:0;
    }

    .Toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .Toolbar__left{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .Toolbar__right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .ResultCount{
      font-weight:800;
      color:var(--text-soft);
    }

    .StatusBadge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:38px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(143,107,70,.08);
      border:1px solid rgba(143,107,70,.12);
      color:var(--text);
      font-weight:800;
      font-size:10pt;
    }

    .StatusDot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--warn);
      flex:0 0 auto;
    }

    .StatusBadge.is-ready .StatusDot{ background:var(--ok); }
    .StatusBadge.is-error .StatusDot{ background:var(--danger); }

    .ProductsGrid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:18px;
    }

    .ProductCard{
      display:flex;
      flex-direction:column;
      min-height:100%;
      border-radius:24px;
      background:rgba(255,253,248,.84);
      border:1px solid rgba(58,45,30,.08);
      box-shadow:var(--shadow-soft);
      overflow:hidden;
    }

    .ProductCard__media{
      aspect-ratio:4 / 3;
      background:linear-gradient(180deg, rgba(248,241,230,.9), rgba(239,232,220,.9));
      border-bottom:1px solid rgba(58,45,30,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .ProductCard__media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .ProductCard__placeholder{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      height:100%;
      color:var(--text-soft);
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      font-size:10pt;
    }

    .ProductCard__placeholderBox{
      width:72px;
      height:72px;
      border-radius:18px;
      border:1px dashed rgba(58,45,30,.20);
      background:rgba(255,255,255,.42);
    }

    .ProductCard__body{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:18px;
      flex:1;
    }

    .ProductCard__top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .ProductCategory{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(143,107,70,.08);
      border:1px solid rgba(143,107,70,.12);
      font-size:9.5pt;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--accent-dark);
    }

    .ProductStock{
      font-size:9.7pt;
      font-weight:900;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:var(--ok);
      white-space:nowrap;
    }

    .ProductStock.is-low{ color:var(--warn); }
    .ProductStock.is-out{ color:var(--danger); }

    .ProductTitle{
      margin:0;
      font-size:16pt;
      line-height:1.15;
    }

    .ProductDesc{
      margin:0;
      color:var(--text-soft);
      line-height:1.62;
      font-size:10.9pt;
    }

    .ProductMeta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .MetaPill{
      display:inline-flex;
      align-items:center;
      min-height:30px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(58,45,30,.04);
      border:1px solid rgba(58,45,30,.08);
      color:var(--text-soft);
      font-size:9.8pt;
      font-weight:800;
    }

    .ProductFooter{
      margin-top:auto;
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:12px;
      flex-wrap:wrap;
    }

    .ProductPrice{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .ProductPrice__label{
      font-size:9.5pt;
      font-weight:900;
      letter-spacing:.10em;
      text-transform:uppercase;
      color:var(--text-soft);
    }

    .ProductPrice__value{
      font-size:19pt;
      line-height:1;
      font-weight:950;
      color:var(--text);
    }

    .ProductActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .EmptyState,
    .LoadingState{
      padding:28px;
      border-radius:24px;
      background:rgba(255,253,248,.84);
      border:1px solid rgba(58,45,30,.08);
      box-shadow:var(--shadow-soft);
      text-align:center;
    }

    .EmptyState h2,
    .LoadingState h2{
      margin:0 0 8px;
      font-size:22pt;
    }

    .EmptyState p,
    .LoadingState p{
      margin:0;
      color:var(--text-soft);
      line-height:1.7;
    }

    .LoadingState{ display:none; }
    .LoadingState.is-active{ display:block; }

    .EmptyState{ display:none; }
    .EmptyState.is-active{ display:block; }

    .ShopNotice{
      margin-top:18px;
      padding:16px 18px;
      border-radius:18px;
      background:rgba(143,107,70,.06);
      border:1px solid rgba(143,107,70,.12);
      color:var(--text-soft);
      line-height:1.65;
      font-size:10.7pt;
    }

    @media (max-width: 1080px){
      .ShopHero__content,
      .ShopLayout{
        grid-template-columns:1fr;
      }

      .FilterPanel{
        position:static;
      }

      .ProductsGrid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px){
      :root{
        --sectionPad:72px;
      }

      .ShopHero{
        padding:118px 0 44px;
      }

      .ShopHero__stats{
        grid-template-columns:1fr;
      }

      .ProductsGrid{
        grid-template-columns:1fr;
      }

      .Toolbar{
        align-items:flex-start;
        flex-direction:column;
      }
    }
  </style>
</head>

<body>
  <div id="HeadbarSlot"></div>

  <main>
    <section class="ShopHero" aria-label="Shop intro">
      <div class="container">
        <div class="ShopHero__content">
          <div>
            <p class="ShopHero__eyebrow">Official Shop</p>
            <h1>Online Shop</h1>
<!--             <p class="ShopHero__text">

            </p> -->
          </div>

          <!-- <div class="ShopHero__stats" aria-label="Shop overview">
            <div class="StatCard">
              <strong id="StatProducts">0</strong>
              <span>Products currently loaded</span>
            </div>
            <div class="StatCard">

    <section class="ShopSection" aria-label="Products">
      <div class="container">
        <div class="ShopLayout">
          <aside class="FilterPanel" aria-label="Shop filters">
            <h2 class="FilterPanel__title">Browse Shop</h2>

            <div class="FilterGroup">
              <label class="FilterLabel" for="ShopSearch">Search</label>
              <input
                id="ShopSearch"
                class="SearchField"
                type="search"
                placeholder="Search products…"
                autocomplete="off"
              />
            </div>

            <div class="FilterGroup">
              <label class="FilterLabel" for="ShopSort">Sort</label>
              <select id="ShopSort" class="SelectField">
                <option value="featured">Featured</option>
                <option value="name-asc">Name A–Z</option>
                <option value="name-desc">Name Z–A</option>
                <option value="price-asc">Price low to high</option>
                <option value="price-desc">Price high to low</option>
              </select>
            </div>

            <div class="FilterGroup">
              <span class="FilterLabel">Categories</span>
              <div class="ChipRow" id="CategoryChips">
                <button class="Chip is-active" type="button" data-category="all">All</button>
              </div>
            </div>

            <div class="FilterActions">
              <button class="btn btn--soft" id="ResetFiltersBtn" type="button">Reset filters</button>
              <button class="btn btn--primary" id="ReloadShopBtn" type="button">Reload data</button>
            </div>
          </aside>

          <section class="ShopMain">
            <div class="Toolbar" aria-label="Shop toolbar">
              <div class="Toolbar__left">
                <div class="ResultCount"><span id="VisibleCount">0</span> products shown</div>
                <div class="StatusBadge" id="DataStatusBadge">
                  <span class="StatusDot"></span>
                  <span id="DataStatusText">Waiting for data…</span>
                </div>
              </div>

              <div class="Toolbar__right">
                <select id="MobileSortMirror" class="SelectField" style="width:220px;">
                  <option value="featured">Featured</option>
                  <option value="name-asc">Name A–Z</option>
                  <option value="name-desc">Name Z–A</option>
                  <option value="price-asc">Price low to high</option>
                  <option value="price-desc">Price high to low</option>
                </select>
              </div>
            </div>

            <div class="LoadingState" id="LoadingState">
              <h2>Loading products…</h2>
              <p></p>
            </div>

            <div class="EmptyState" id="EmptyState">
              <h2>No products found</h2>
              <p>Try a different search term or reset the filters.</p>
            </div>

            <div class="ProductsGrid" id="ProductsGrid" aria-live="polite"></div>

            </div> -->
          </section>
        </div>
      </div>
    </section>
  </main>

  <div id="FootbarSlot"></div>
  <div id="CookieSlot"></div>

  <script src="../Scripts/includes.js"></script>

  <script>
    (function(){
      const shopConfig = {
        endpointUrl: "https://script.google.com/macros/s/AKfycbxFrMYVqiKJaqu1g9MEKna39K4FPXez9PjlJ_BIzki4_SCME4cyGmAQsSnat7ke1uMg-g/exec",
        currency: "EUR",
        locale: "de-DE",
        sheet: "Shop"
      };

      const productsGrid = document.getElementById("ProductsGrid");
      const searchInput = document.getElementById("ShopSearch");
      const sortSelect = document.getElementById("ShopSort");
      const mobileSortMirror = document.getElementById("MobileSortMirror");
      const categoryChipsWrap = document.getElementById("CategoryChips");
      const resetBtn = document.getElementById("ResetFiltersBtn");
      const reloadBtn = document.getElementById("ReloadShopBtn");
      const emptyState = document.getElementById("EmptyState");
      const loadingState = document.getElementById("LoadingState");
      const visibleCount = document.getElementById("VisibleCount");
      const statProducts = document.getElementById("StatProducts");
      const statCategories = document.getElementById("StatCategories");
      const dataStatusBadge = document.getElementById("DataStatusBadge");
      const dataStatusText = document.getElementById("DataStatusText");

      let allProducts = [];
      let activeCategory = "all";

      function formatPrice(value, currency){
        const number = Number(value || 0);
        return new Intl.NumberFormat(shopConfig.locale, {
          style: "currency",
          currency: currency || shopConfig.currency,
          minimumFractionDigits: 2
        }).format(number);
      }

      function stockClass(stock){
        if(stock === "out-of-stock") return "is-out";
        if(stock === "low-stock") return "is-low";
        return "";
      }

      function prettyCategory(category){
        const map = {
          "music": "Music",
          "vinyl": "Vinyl",
          "merch": "Merch",
          "sheet-music": "Sheet Music"
        };
        return map[category] || startCase(category || "Item");
      }

      function startCase(value){
        return String(value)
          .replace(/[-_]+/g, " ")
          .replace(/\b\w/g, function(m){ return m.toUpperCase(); });
      }

      function escapeHtml(value){
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeAttribute(value){
        return String(value ?? "").replace(/"/g, "&quot;");
      }

      function productCardTemplate(product){
        const tags = Array.isArray(product.tags) ? product.tags : [];
        const metaHtml = tags.map(tag => `<span class="MetaPill">${escapeHtml(tag)}</span>`).join("");

        const mediaHtml = product.image
          ? `<img src="${escapeAttribute(product.image)}" alt="${escapeHtml(product.title)}" loading="lazy" decoding="async">`
          : `
            <div class="ProductCard__placeholder" aria-hidden="true">
              <div class="ProductCard__placeholderBox"></div>
              <span>No image yet</span>
            </div>
          `;

        const targetAttr = product.external ? ` target="_blank" rel="noopener"` : "";

        return `
          <article class="ProductCard" data-category="${escapeHtml(product.category || "")}">
            <div class="ProductCard__media">
              ${mediaHtml}
            </div>

            <div class="ProductCard__body">
              <div class="ProductCard__top">
                <span class="ProductCategory">${escapeHtml(prettyCategory(product.category))}</span>
                <span class="ProductStock ${stockClass(product.stock)}">${escapeHtml(product.stockLabel || "")}</span>
              </div>

              <div>
                <h2 class="ProductTitle">${escapeHtml(product.title)}</h2>
              </div>

              <p class="ProductDesc">${escapeHtml(product.description || "")}</p>

              <div class="ProductMeta">
                ${product.sku ? `<span class="MetaPill">${escapeHtml(product.sku)}</span>` : ""}
                ${metaHtml}
              </div>

              <div class="ProductFooter">
                <div class="ProductPrice">
                  <span class="ProductPrice__label">Price</span>
                  <span class="ProductPrice__value">${formatPrice(product.price, product.currency)}</span>
                </div>

                <div class="ProductActions">
                  <a class="btn btn--soft" href="${escapeAttribute(product.buttonUrl || "#")}"${targetAttr}>
                    ${escapeHtml(product.buttonLabel || "View")}
                  </a>
                </div>
              </div>
            </div>
          </article>
        `;
      }

      function getFilteredProducts(){
        const term = (searchInput?.value || "").trim().toLowerCase();
        const sortValue = sortSelect?.value || "featured";

        let filtered = allProducts.filter(product => {
          const matchesCategory = activeCategory === "all" || product.category === activeCategory;
          const haystack = [
            product.title,
            product.description,
            product.category,
            ...(product.tags || []),
            product.sku
          ].join(" ").toLowerCase();

          const matchesSearch = !term || haystack.includes(term);
          return matchesCategory && matchesSearch;
        });

        filtered.sort((a, b) => {
          if(sortValue === "name-asc") return String(a.title).localeCompare(String(b.title));
          if(sortValue === "name-desc") return String(b.title).localeCompare(String(a.title));
          if(sortValue === "price-asc") return Number(a.price || 0) - Number(b.price || 0);
          if(sortValue === "price-desc") return Number(b.price || 0) - Number(a.price || 0);
          return Number(a.featured || 9999) - Number(b.featured || 9999);
        });

        return filtered;
      }

      function renderProducts(){
        const filtered = getFilteredProducts();

        productsGrid.innerHTML = filtered.map(productCardTemplate).join("");
        visibleCount.textContent = String(filtered.length);

        emptyState.classList.toggle("is-active", filtered.length === 0);
        productsGrid.style.display = filtered.length === 0 ? "none" : "grid";

        const categories = new Set(allProducts.map(p => p.category).filter(Boolean));
        if(statProducts) statProducts.textContent = String(allProducts.length);
        if(statCategories) statCategories.textContent = String(categories.size);
      }

      function setStatus(text, type){
        dataStatusText.textContent = text;
        dataStatusBadge.classList.remove("is-ready", "is-error");
        if(type === "ready") dataStatusBadge.classList.add("is-ready");
        if(type === "error") dataStatusBadge.classList.add("is-error");
      }

      function setActiveChip(category){
        activeCategory = category;
        Array.from(categoryChipsWrap.querySelectorAll(".Chip")).forEach(chip => {
          chip.classList.toggle("is-active", chip.dataset.category === category);
        });
      }

      function buildCategoryChips(products){
        const categories = [...new Set(products.map(p => p.category).filter(Boolean))].sort((a, b) => {
          return prettyCategory(a).localeCompare(prettyCategory(b));
        });

        categoryChipsWrap.innerHTML = `
          <button class="Chip is-active" type="button" data-category="all">All</button>
          ${categories.map(category => `
            <button class="Chip" type="button" data-category="${escapeAttribute(category)}">
              ${escapeHtml(prettyCategory(category))}
            </button>
          `).join("")}
        `;

        Array.from(categoryChipsWrap.querySelectorAll(".Chip")).forEach(chip => {
          chip.addEventListener("click", () => {
            setActiveChip(chip.dataset.category || "all");
            renderProducts();
          });
        });
      }

      async function loadProducts(){
        loadingState.classList.add("is-active");
        productsGrid.style.display = "none";
        emptyState.classList.remove("is-active");
        setStatus("Loading live data…", "");

        try{
          const url = new URL(shopConfig.endpointUrl);
          url.searchParams.set("sheet", shopConfig.sheet);

          const res = await fetch(url.toString(), {
            method: "GET",
            cache: "no-store"
          });

          if(!res.ok){
            throw new Error("HTTP " + res.status);
          }

          const data = await res.json();

          if(!data.ok){
            throw new Error(data.error || "Unknown API error");
          }

          allProducts = Array.isArray(data.products) ? data.products : [];
          buildCategoryChips(allProducts);
          setActiveChip("all");
          setStatus("Live data loaded", "ready");
        }catch(error){
          console.warn("[shop] loading failed:", error);
          allProducts = [];
          buildCategoryChips([]);
          setActiveChip("all");
          setStatus("Data source unavailable", "error");
        }finally{
          loadingState.classList.remove("is-active");
          renderProducts();
        }
      }

      function bindEvents(){
        searchInput?.addEventListener("input", renderProducts);

        sortSelect?.addEventListener("change", () => {
          if(mobileSortMirror) mobileSortMirror.value = sortSelect.value;
          renderProducts();
        });

        mobileSortMirror?.addEventListener("change", () => {
          if(sortSelect) sortSelect.value = mobileSortMirror.value;
          renderProducts();
        });

        resetBtn?.addEventListener("click", () => {
          if(searchInput) searchInput.value = "";
          if(sortSelect) sortSelect.value = "featured";
          if(mobileSortMirror) mobileSortMirror.value = "featured";
          setActiveChip("all");
          renderProducts();
        });

        reloadBtn?.addEventListener("click", loadProducts);
      }

      bindEvents();
      loadProducts();

      document.addEventListener("partials:loaded", function(){
        const yearSlots = document.querySelectorAll("#YearSlot, .YearSlot, [data-current-year]");
        if(yearSlots.length){
          const year = String(new Date().getFullYear());
          yearSlots.forEach(el => { el.textContent = year; });
        }
      });
    })();
  </script>

  <script>
    function initJustinHeadbarBurger(){
      const root = document.querySelector(".HeadbarWrap");
      if(!root) return;

      const burger = root.querySelector(".Burger");
      const panel = root.querySelector(".MobileMenu");
      const overlay = root.querySelector(".MobileMenuOverlay");
      const navLinks = root.querySelectorAll(".js-nav");

      if(!burger || !panel || !overlay) return;
      if(root.dataset.burgerInit === "true") return;

      root.dataset.burgerInit = "true";

      function setOpen(isOpen){
        burger.setAttribute("aria-expanded", isOpen ? "true" : "false");
        panel.classList.toggle("is-open", isOpen);
        overlay.classList.toggle("is-open", isOpen);
        document.body.classList.toggle("MobileMenuOpen", isOpen);
      }

      burger.addEventListener("click", function(e){
        e.preventDefault();
        e.stopPropagation();
        const isOpen = burger.getAttribute("aria-expanded") === "true";
        setOpen(!isOpen);
      });

      overlay.addEventListener("click", function(){
        setOpen(false);
      });

      navLinks.forEach(function(link){
        link.addEventListener("click", function(){
          setOpen(false);
        });
      });

      document.addEventListener("keydown", function(e){
        if(e.key === "Escape"){
          setOpen(false);
        }
      });

      document.addEventListener("click", function(e){
        const isOpen = burger.getAttribute("aria-expanded") === "true";
        if(!isOpen) return;
        if(root.contains(e.target)) return;
        setOpen(false);
      });

      function setActiveFromHash(){
        const hash = window.location.hash.replace("#", "");
        const links = root.querySelectorAll(".Headbar__nav .js-nav, .MobileMenu__list .js-nav");
        links.forEach(function(a){
          a.classList.toggle("is-active", a.getAttribute("data-target") === hash);
        });
      }

      window.addEventListener("hashchange", setActiveFromHash);
      setActiveFromHash();
    }

    window.addEventListener("load", function(){
      let tries = 0;

      function waitForHeadbar(){
        const headbar = document.querySelector(".HeadbarWrap");

        if(headbar){
          initJustinHeadbarBurger();
          return;
        }

        tries++;
        if(tries < 80){
          setTimeout(waitForHeadbar, 100);
        }
      }

      waitForHeadbar();
    });
  </script>
</body>
