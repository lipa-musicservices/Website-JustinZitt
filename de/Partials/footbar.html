<footer class="Footbar" role="contentinfo">
  <style>
    .Footbar{
      margin:0;
      color:#f6eee5;
      background:
        radial-gradient(680px 220px at 8% 0%, rgba(170,112,63,.13), rgba(0,0,0,0) 58%),
        radial-gradient(520px 200px at 92% 0%, rgba(106,47,134,.10), rgba(0,0,0,0) 56%),
        linear-gradient(180deg, #241813 0%, #17100d 100%);
      border-top:1px solid rgba(255,255,255,.08);
      overflow:hidden;
    }

    .Footbar a{
      color:inherit;
      text-decoration:none;
    }

    .Footbar__wrap{
      width:min(1160px, calc(100% - 32px));
      margin:0 auto;
      padding:18px 0 10px;
    }

    .Footbar__main{
      display:grid;
      grid-template-columns:1.15fr .95fr;
      gap:34px;
      align-items:center;
    }

    .Footbar__brand{
      margin:0 0 8px 0;
      font-size:clamp(24px, 2.3vw, 32px);
      line-height:1;
      font-weight:900;
      letter-spacing:-.03em;
      color:#fff8f0;
    }

    .Footbar__copy{
      margin:0 0 12px 0;
      font-size:10.2pt;
      font-weight:700;
      color:rgba(246,238,229,.74);
    }

    .Footbar__contact{
      display:flex;
      flex-direction:column;
      gap:9px;
      margin:0;
    }

    .Footbar__contactLink{
      display:inline-flex;
      align-items:center;
      gap:10px;
      width:fit-content;
      color:#fff8f0;
      font-weight:700;
      transition:opacity .16s ease, transform .16s ease;
    }

    .Footbar__contactLink:hover{
      opacity:.88;
      transform:translateX(2px);
    }

    .Footbar__icon{
      width:16px;
      height:16px;
      flex:0 0 auto;
      opacity:.82;
    }

    .Footbar__navWrap{
      display:flex;
      justify-content:flex-end;
    }

    .Footbar__navBox{
      width:min(100%, 430px);
    }

    .Footbar__title{
      margin:0 0 10px 0;
      font-size:9.6pt;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#d8b892;
    }

    .Footbar__list{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px 26px;
    }

    .Footbar__list li{
      margin:0;
      padding:0;
    }

    .Footbar__list a{
      display:inline-block;
      color:rgba(246,238,229,.86);
      font-weight:700;
      transition:color .16s ease, transform .16s ease;
    }

    .Footbar__list a:hover{
      color:#ffffff;
      transform:translateX(2px);
    }

    .Footbar__middle{
      margin-top:14px;
      padding-top:12px;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      justify-content:flex-start;
    }

    .Footbar__social{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .Footbar__socialBtn{
      width:38px;
      height:38px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      transition:transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .Footbar__socialBtn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.09);
      border-color:rgba(255,255,255,.16);
    }

    .Footbar__socialBtn img{
      width:18px;
      height:18px;
      display:block;
      object-fit:contain;
    }

    .Footbar__bottom{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .FootbarLegal{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:10px;
      color:rgba(246,238,229,.72);
      font-size:10.1pt;
    }

    .FootbarLegal a{
      transition:color .16s ease;
    }

    .FootbarLegal a:hover{
      color:#ffffff;
    }

    .FootbarLegal__sep{
      opacity:.45;
    }

    .Footbar__powered{
      font-size:10.1pt;
      font-weight:700;
      color:#d8b892;
      text-align:right;
    }

    .Footbar__powered a{
      transition:color .16s ease;
    }

    .Footbar__powered a:hover{
      color:#fff8f0;
    }

    @media (max-width: 860px){
      .Footbar__main{
        grid-template-columns:1fr;
        gap:22px;
        align-items:start;
      }

      .Footbar__navWrap{
        justify-content:flex-start;
      }

      .Footbar__navBox{
        width:100%;
        max-width:none;
      }

      .Footbar__bottom{
        flex-direction:column;
        align-items:flex-start;
      }

      .Footbar__powered{
        text-align:left;
      }
    }

    @media (max-width: 520px){
      .Footbar__wrap{
        padding:16px 0 10px;
      }

      .Footbar__list{
        grid-template-columns:1fr 1fr;
        gap:8px 18px;
      }
    }

    @media (max-width: 420px){
      .Footbar__list{
        grid-template-columns:1fr;
      }
    }
  </style>
