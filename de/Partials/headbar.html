<header class="HeadbarWrap" role="banner">
  <style>
    .HeadbarWrap{
      position:sticky;
      top:0;
      z-index:1000;
      padding:12px 12px 0;
      background:linear-gradient(to bottom, rgba(251,247,240,.9), rgba(251,247,240,0));
      backdrop-filter:saturate(1.05);
      -webkit-backdrop-filter:saturate(1.05);
    }

    .Headbar{
      max-width:1160px;
      height:76px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:0 18px;
      background:rgba(255,253,248,.82);
      border:1px solid rgba(58,45,30,.10);
      border-radius:22px;
      box-shadow:0 14px 42px rgba(37,25,14,.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .Headbar__brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:230px;
      text-decoration:none;
      color:#231c15;
    }

    .Headbar__mark{
      width:38px;
      height:38px;
      border-radius:13px;
      background:
        radial-gradient(120% 120% at 25% 20%, rgba(200,171,132,.9), rgba(200,171,132,.18) 45%, rgba(0,0,0,0) 70%),
        linear-gradient(180deg, #fbf6ed, #eee3d2);
      border:1px solid rgba(143,107,70,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
      position:relative;
      flex:0 0 auto;
    }

    .Headbar__mark::after{
      content:"";
      position:absolute;
      inset:9px;
      border:1px solid rgba(143,107,70,.28);
      border-radius:10px;
    }

    .Headbar__title{
      display:flex;
      flex-direction:column;
      gap:2px;
      line-height:1.05;
    }

    .Headbar__name{
      font-size:12.5pt;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .Headbar__tag{
      font-size:10.2pt;
      color:#6b6258;
      font-weight:600;
    }

    .Headbar__nav{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      flex:1;
    }

    .Headbar__nav a{
      position:relative;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 11px;
      border-radius:12px;
      color:#6b6258;
      font-size:10.5pt;
      font-weight:800;
      letter-spacing:.08em;
      text-decoration:none;
      transition:background .16s ease, color .16s ease, transform .16s ease;
      white-space:nowrap;
    }

    .Headbar__nav a:hover{
      background:rgba(143,107,70,.08);
      color:#231c15;
      transform:translateY(-1px);
    }

    .Headbar__nav a.is-active{
      color:#231c15;
      background:rgba(143,107,70,.10);
    }

    .Headbar__nav a.is-active::after{
      content:"";
      position:absolute;
      left:11px;
      right:11px;
      bottom:7px;
      height:2px;
      border-radius:2px;
      background:linear-gradient(90deg, #8f6b46, #ccb08a);
    }

    .Headbar__shop{
      background:rgba(106,47,134,.08);
      border:1px solid rgba(106,47,134,.16);
      color:#231c15 !important;
    }

    .Headbar__shop:hover{
      background:rgba(106,47,134,.13) !important;
      border-color:rgba(106,47,134,.24);
    }

    .Headbar__shopIcon{
      font-size:.95em;
      opacity:.7;
      transform:translateY(-1px);
    }

    .Headbar__actions{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:flex-end;
      min-width:220px;
    }

    .IconBtn{
      width:40px;
      height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      border:1px solid rgba(58,45,30,.12);
      background:rgba(255,255,255,.46);
      transition:background .16s ease, transform .16s ease, border-color .16s ease;
      text-decoration:none;
    }

    .IconBtn:hover{
      background:#fff;
      transform:translateY(-1px);
      border-color:rgba(58,45,30,.18);
    }

    .IconBtn img{
      width:18px;
      height:18px;
      display:block;
    }

    .Lang{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.55);
      border:1px solid rgba(58,45,30,.10);
    }

    .Lang a{
      padding:6px 9px;
      border-radius:999px;
      font-size:9.8pt;
      font-weight:900;
      letter-spacing:.08em;
      color:#6b6258;
      text-decoration:none;
      transition:background .16s ease, color .16s ease;
    }

    .Lang a:hover{
      color:#231c15;
    }

    .Lang a.is-active{
      background:rgba(143,107,70,.12);
      color:#231c15;
    }

    .Burger{
      width:44px;
      height:44px;
      display:none;
      align-items:center;
      justify-content:center;
      gap:5px;
      flex-direction:column;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.46);
      border:1px solid rgba(58,45,30,.12);
      cursor:pointer;
    }

    .Burger span{
      display:block;
      width:18px;
      height:2px;
      border-radius:2px;
      background:#231c15;
      transition:transform .18s ease, opacity .18s ease;
    }

    .Burger[aria-expanded="true"] span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
    .Burger[aria-expanded="true"] span:nth-child(2){ opacity:0; }
    .Burger[aria-expanded="true"] span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

    .MobileMenu{
      max-width:1160px;
      margin:10px auto 0;
      display:none;
      background:rgba(255,253,248,.95);
      border:1px solid rgba(58,45,30,.12);
      border-radius:22px;
      box-shadow:0 14px 42px rgba(37,25,14,.08);
      overflow:hidden;
    }

    .MobileMenu.is-open{ display:block; }

    .MobileMenu__list{
      list-style:none;
      margin:0;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .MobileMenu__list a{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:13px 14px;
      border-radius:14px;
      color:#231c15;
      background:rgba(143,107,70,.05);
      border:1px solid rgba(58,45,30,.08);
      font-weight:800;
      letter-spacing:.08em;
      text-decoration:none;
    }

    .MobileMenu__list a.MobileMenu__shop{
      background:rgba(106,47,134,.08);
      border-color:rgba(106,47,134,.16);
    }

    .MobileMenu__bottom{
      padding:10px 12px 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      border-top:1px solid rgba(58,45,30,.08);
      background:rgba(143,107,70,.04);
    }

    .MobileMenu__social{
      display:flex;
      gap:10px;
    }

    @media (max-width: 1080px){
      .Headbar__nav{ display:none; }
      .Burger{ display:flex; }
      .Headbar__brand{ min-width:auto; }
      .Headbar__actions{ min-width:auto; }
    }

    @media (max-width: 720px){
      .Headbar{
        height:68px;
        padding:0 14px;
      }

      .Headbar__tag,
      .Lang{
        display:none;
      }
    }
  </style>

  <script>
    (function(){
      const root = document.currentScript.closest("header");
      const burger = root.querySelector(".Burger");
      const panel = root.querySelector("#MobileMenu");
      const navLinks = Array.from(root.querySelectorAll(".js-nav"));

      function setOpen(isOpen){
        burger?.setAttribute("aria-expanded", String(isOpen));
        panel?.classList.toggle("is-open", isOpen);
      }

      burger?.addEventListener("click", () => {
        const open = burger.getAttribute("aria-expanded") === "true";
        setOpen(!open);
      });

      function isSamePageAnchor(href){
        if(!href) return false;
        return href.includes("#");
      }

      navLinks.forEach(link => {
        link.addEventListener("click", () => {
          setOpen(false);
        });
      });

      document.addEventListener("keydown", (e) => {
        if(e.key === "Escape") setOpen(false);
      });

      document.addEventListener("click", (e) => {
        const open = burger?.getAttribute("aria-expanded") === "true";
        if(!open) return;
        const bar = root.querySelector(".Headbar");
        if(bar?.contains(e.target)) return;
        if(panel?.contains(e.target)) return;
        setOpen(false);
      });

      function setActiveFromHash(){
        const hash = window.location.hash.replace("#", "");
        const links = Array.from(root.querySelectorAll(".Headbar__nav .js-nav, .MobileMenu__list .js-nav"));
        links.forEach(a => {
          a.classList.toggle("is-active", a.getAttribute("data-target") === hash);
        });
      }

      window.addEventListener("hashchange", setActiveFromHash);
      setActiveFromHash();
    })();
  </script>
