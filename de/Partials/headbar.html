<header class="HeadbarWrap" role="banner">
  <style>
    .HeadbarWrap{
      position:sticky;
      top:0;
      z-index:1000;
      padding:12px 12px 0;
      background:linear-gradient(to bottom, rgba(251,247,240,.92), rgba(251,247,240,0));
      backdrop-filter:saturate(1.05);
      -webkit-backdrop-filter:saturate(1.05);
    }

    .Headbar{
      max-width:1160px;
      height:76px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:0 18px;
      background:rgba(255,253,248,.84);
      border:1px solid rgba(58,45,30,.10);
      border-radius:22px;
      box-shadow:0 14px 42px rgba(37,25,14,.08);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      position:relative;
      z-index:1002;
    }

    .Headbar__brand{
      display:flex;
      align-items:center;
      min-width:220px;
      text-decoration:none;
      color:#231c15;
      flex:0 0 auto;
    }

    .Headbar__title{
      display:flex;
      flex-direction:column;
      gap:2px;
      line-height:1.02;
    }

    .Headbar__name{
      font-size:13pt;
      font-weight:950;
      letter-spacing:.16em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .Headbar__tag{
      font-size:10.1pt;
      color:#6b6258;
      font-weight:650;
      white-space:nowrap;
    }

    .Headbar__nav{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      flex:1;
      min-width:0;
    }

    .Headbar__nav a{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 11px;
      border-radius:12px;
      color:#6b6258;
      font-size:10.5pt;
      font-weight:850;
      letter-spacing:.08em;
      text-decoration:none;
      transition:background .16s ease, color .16s ease, transform .16s ease, border-color .16s ease;
      white-space:nowrap;
    }

    .Headbar__nav a:hover{
      background:rgba(143,107,70,.08);
      color:#231c15;
      transform:translateY(-1px);
    }

    .Headbar__nav a.is-active{
      color:#231c15;
      background:rgba(143,107,70,.10);
    }

    .Headbar__nav a.is-active::after{
      content:"";
      position:absolute;
      left:11px;
      right:11px;
      bottom:7px;
      height:2px;
      border-radius:2px;
      background:linear-gradient(90deg, #8f6b46, #ccb08a);
    }

    .Headbar__shop{
      background:rgba(106,47,134,.08);
      border:1px solid rgba(106,47,134,.16);
      color:#231c15 !important;
      padding-inline:14px !important;
      margin-inline-end:25px;
    }

    .Headbar__shop:hover{
      background:rgba(106,47,134,.13) !important;
      border-color:rgba(106,47,134,.24) !important;
    }

    .Headbar__shopIcon{
      font-size:.92em;
      opacity:.72;
      transform:translateY(-1px);
      margin-left:2px;
    }

    .Headbar__actions{
      display:flex;
      align-items:center;
      gap:8px;
      justify-content:flex-end;
      min-width:240px;
      flex:0 0 auto;
    }

    .IconBtn{
      width:40px;
      height:40px;
      min-width:40px;
      min-height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      border:1px solid rgba(58,45,30,.12);
      background:rgba(255,255,255,.50);
      transition:background .16s ease, transform .16s ease, border-color .16s ease;
      text-decoration:none;
      overflow:hidden;
      aspect-ratio:1 / 1;
      flex:0 0 40px;
    }

    .IconBtn:hover{
      background:#fff;
      transform:translateY(-1px);
      border-color:rgba(58,45,30,.18);
    }

    .IconBtn img{
      width:18px;
      height:18px;
      display:block;
      object-fit:contain;
    }

    .Lang{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.55);
      border:1px solid rgba(58,45,30,.10);
      margin-left:2px;
    }

    .Lang a{
      padding:6px 9px;
      border-radius:999px;
      font-size:9.8pt;
      font-weight:900;
      letter-spacing:.08em;
      color:#6b6258;
      text-decoration:none;
      transition:background .16s ease, color .16s ease;
    }

    .Lang a:hover{
      color:#231c15;
    }

    .Lang a.is-active{
      background:rgba(143,107,70,.12);
      color:#231c15;
    }

    .Burger{
      width:44px;
      height:44px;
      display:none;
      align-items:center;
      justify-content:center;
      gap:5px;
      flex-direction:column;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.50);
      border:1px solid rgba(58,45,30,.12);
      cursor:pointer;
      flex:0 0 44px;
      position:relative;
      z-index:1004;
    }

    .Burger span{
      display:block;
      width:18px;
      height:2px;
      border-radius:2px;
      background:#231c15;
      transition:transform .18s ease, opacity .18s ease;
      transform-origin:center;
    }

    .Burger[aria-expanded="true"] span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
    .Burger[aria-expanded="true"] span:nth-child(2){ opacity:0; }
    .Burger[aria-expanded="true"] span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

    .MobileMenuOverlay{
      position:fixed;
      inset:0;
      background:rgba(27,18,11,.24);
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transition:opacity .25s ease, visibility .25s ease;
      z-index:1001;
    }

    .MobileMenuOverlay.is-open{
      opacity:1;
      visibility:visible;
      pointer-events:auto;
    }

    .MobileMenu{
      position:absolute;
      top:calc(100% + 10px);
      right:12px;
      width:min(420px, calc(100vw - 24px));
      max-height:calc(100vh - 110px);
      overflow:auto;
      background:rgba(255,253,248,.98);
      border:1px solid rgba(58,45,30,.12);
      border-radius:22px;
      box-shadow:0 20px 54px rgba(37,25,14,.14);
      transform:translateX(calc(100% + 24px));
      opacity:0;
      visibility:hidden;
      pointer-events:none;
      transition:transform .30s ease, opacity .22s ease, visibility .22s ease;
      z-index:1003;
    }

    .MobileMenu.is-open{
      transform:translateX(0);
      opacity:1;
      visibility:visible;
      pointer-events:auto;
    }

    .MobileMenu__list{
      list-style:none;
      margin:0;
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .MobileMenu__list a{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:13px 14px;
      border-radius:14px;
      color:#231c15;
      background:rgba(143,107,70,.05);
      border:1px solid rgba(58,45,30,.08);
      font-weight:850;
      letter-spacing:.08em;
      text-decoration:none;
      transition:background .16s ease, transform .16s ease;
    }

    .MobileMenu__list a:hover{
      background:rgba(143,107,70,.09);
      transform:translateX(-2px);
    }

    .MobileMenu__list a.MobileMenu__shop{
      background:rgba(106,47,134,.08);
      border-color:rgba(106,47,134,.16);
    }

    .MobileMenu__bottom{
      padding:10px 12px 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      border-top:1px solid rgba(58,45,30,.08);
      background:rgba(143,107,70,.04);
    }

    .MobileMenu__social{
      display:flex;
      gap:10px;
      align-items:center;
    }

    body.MobileMenuOpen{
      overflow:hidden;
    }

    @media (max-width: 1120px){
      .Headbar__nav{ display:none; }
      .Burger{ display:flex; }
      .Headbar__actions{ min-width:auto; }
      .Headbar__brand{ min-width:auto; }
    }

    @media (min-width: 1121px){
      .MobileMenu,
      .MobileMenuOverlay{
        display:none !important;
      }
    }

    @media (max-width: 720px){
      .Headbar{
        height:68px;
        padding:0 14px;
      }

      .Headbar__tag,
      .Lang{
        display:none;
      }

      .Headbar__name{
        font-size:11.9pt;
        letter-spacing:.14em;
      }

      .Headbar__actions{
        gap:6px;
      }

      .MobileMenu{
        right:0;
        width:min(360px, calc(100vw - 12px));
      }
    }

    @media (max-width: 480px){
      .Headbar__actions .IconBtn:nth-child(3){
        display:none;
      }

      .MobileMenu{
        width:calc(100vw - 8px);
        right:0;
      }
    }
  </style>

  <script>
    (function(){
      const root = document.querySelector(".HeadbarWrap");
      if(!root) return;

      const burger = root.querySelector(".Burger");
      const panel = root.querySelector(".MobileMenu");
      const overlay = root.querySelector(".MobileMenuOverlay");
      const navLinks = root.querySelectorAll(".js-nav");

      if(!burger || !panel || !overlay) return;

      function setOpen(isOpen){
        burger.setAttribute("aria-expanded", isOpen ? "true" : "false");
        panel.classList.toggle("is-open", isOpen);
        overlay.classList.toggle("is-open", isOpen);
        document.body.classList.toggle("MobileMenuOpen", isOpen);
      }

      burger.addEventListener("click", function(e){
        e.preventDefault();
        e.stopPropagation();
        const isOpen = burger.getAttribute("aria-expanded") === "true";
        setOpen(!isOpen);
      });

      overlay.addEventListener("click", function(){
        setOpen(false);
      });

      navLinks.forEach(function(link){
        link.addEventListener("click", function(){
          setOpen(false);
        });
      });

      document.addEventListener("keydown", function(e){
        if(e.key === "Escape"){
          setOpen(false);
        }
      });

      function setActiveFromHash(){
        const hash = window.location.hash.replace("#", "");
        const links = root.querySelectorAll(".Headbar__nav .js-nav, .MobileMenu__list .js-nav");
        links.forEach(function(a){
          a.classList.toggle("is-active", a.getAttribute("data-target") === hash);
        });
      }

      window.addEventListener("hashchange", setActiveFromHash);
      setActiveFromHash();
    })();
  </script>
